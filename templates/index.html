<!DOCTYPE html>
<html>
<head>
    <title>SQL Injection Detector</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f4f4f4; }
        textarea { width: 100%; height: 120px; padding: 10px; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 18px; }
        .HIGH { background: #ffdddd; color: red; }
        .MEDIUM { background: #fff4cc; color: orange; }
        .LOW { background: #ddffdd; color: green; }
    </style>
</head>
<body>
    <h1>🔍 SQL Injection Detection System</h1>
    <form method="POST">
        <textarea name="query" placeholder="Nhập câu truy vấn SQL..."></textarea><br><br>
        <button type="submit">Kiểm tra</button>
    </form>

    {% if result %}
    <div class="result {{ result.risk }}">
        <h2>Kết quả: {{ result.status }}</h2>
        <p><strong>Xác suất:</strong> {{ result.probability }}%</p>
        <p><strong>Risk Level:</strong> {{ result.risk }}</p>
    </div>
    {% endif %}
</body>
</html>
